services:
  web:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    working_dir: /app/frontend/web_app
    env_file:
      - ../.env
    environment:
      CLIENT_URL: http://localhost:3000
      SUPABASE_EMAIL_REDIRECT_URL: http://localhost:3000/login?confirmed=1
      SUPABASE_GOOGLE_REDIRECT_URL: http://localhost:3000/api/auth/google/callback
    volumes:
      - ../frontend/web_app:/app/frontend/web_app
      - frontend_node_modules:/app/frontend/web_app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"

volumes:
  frontend_node_modules:
