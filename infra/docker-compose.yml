services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: quackup_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: infra/docker/backend.Dockerfile
    working_dir: /app/backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/quackup_dev?schema=public
      CLIENT_URL: http://localhost:5173
    volumes:
      - ../backend:/app/backend
      - ../database:/app/database
      - backend_node_modules:/app/backend/node_modules
    command: >
      sh -c "npm install &&
      npm run db:generate &&
      npm run db:push &&
      npm run db:seed &&
      npm run dev"
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  frontend:
    build:
      context: ..
      dockerfile: infra/docker/frontend.Dockerfile
    working_dir: /app/frontend/web_app
    environment:
      VITE_API_URL: http://localhost:3001/api
    volumes:
      - ../frontend/web_app:/app/frontend/web_app
      - frontend_node_modules:/app/frontend/web_app/node_modules
    command: sh -c "npm install && npm run dev"
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
